[flake8]
exclude=wsgi.py,env/*,*/migrations/*,venv/*,.env/*,.venv/*,local_settings.py,doc/*,*/node_modules/*
ignore=F403,E128,E126,E123,E121,E265,E501,N802,N803,N806,C901,D100,D102,D102,D10,W503
import-order-style = smarkets

[tool:pytest]
DJANGO_SETTINGS_MODULE = imgz.settings
norecursedirs = .venv .env
addopts = --cov=.
filterwarnings =
    # Turn most warnings into errors
    error
    # except this one that comes from `six` in stripe
    ignore:_SixMetaPathImporter:ImportWarning
    # and this needs fixing
    ignore:.*received a naive datetime.*:RuntimeWarning

[coverage:report]
omit =
    .venv/*
    .env/*
    */.virtualenvs/*
    */migrations/*
    # Without this you'll get "No source for code: '<repo root>/config-3.py'";
    # when running coverage standalone (i.e. not via pytest --cov). It appears
    # to come from opencv-python, and for unclear reasons.
    config*.py

[coverage:run]
branch = True
omit =
    .venv/*
    .env/*
    */.virtualenvs/*
    */migrations/*

[mypy]
python_version = 3.7

check_untyped_defs = True
disallow_any_generics = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
ignore_errors = False
ignore_missing_imports = True
implicit_reexport = False
strict_optional = True
strict_equality = True
no_implicit_optional = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
warn_unreachable = True
warn_no_return = True