{% extends "base.html" %}

{% load humanize %}

{% block title %}{{ image.name }}{% endblock %}

{% block content %}
    <section class="section-grey section-top-border" id="features" style="margin-top: 40px">

        <!--begin container -->
        <div class="container">

            <!--begin row -->
            <div class="row">

                <!--begin col-md-12-->
                <div class="col-md-12 text-center padding-bottom-10">

                    <h2 class="section-title">{{ image.name }}</h2>

                    <p>
                    <a href="{{ image.get_image_url }}"><img style="max-width: 100%" src="{{ image.get_image_url }}" /></a>
                    </p>

                    <p>
                    Viewed {{ image.views }} times
                    </p>

                </div>
                <!--end col-md-12 -->

            </div>
            <!--end row -->

        </div>
        <!--end container -->

    </section>
{% endblock %}
